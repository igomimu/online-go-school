name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: yzsyrtesydpulctjgdog
        run: |
          # Edge Functions は Stage 2 以降で追加される。
          # 関数を追加したら、以下のコメントを外して1行ずつ追記する:
          # supabase functions deploy issue_session --project-ref $SUPABASE_PROJECT_REF
          # supabase functions deploy submit_move --project-ref $SUPABASE_PROJECT_REF
          echo "No Edge Functions to deploy yet. Populated in Stage 2+."
